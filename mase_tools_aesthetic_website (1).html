<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mase Tools Pro</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',sans-serif;background:#020617;color:#e2e8f0;display:flex}

.sidebar{
 width:220px;
 background:#020617;
 border-right:1px solid #0f172a;
 padding:20px;
 height:100vh;
}

.sidebar h2{margin-bottom:20px}
.sidebar div{margin:10px 0;cursor:pointer;opacity:.7}
.sidebar div:hover{opacity:1}

.main{flex:1;padding:30px}

header{display:flex;justify-content:space-between;align-items:center}
h1{font-size:2rem;font-weight:800;background:linear-gradient(90deg,#38bdf8,#a78bfa);-webkit-background-clip:text;-webkit-text-fill-color:transparent}

.search input{padding:10px;border-radius:10px;border:none;background:#0f172a;color:white}

.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:15px;margin-top:20px}
.card{background:#0f172a;padding:15px;border-radius:15px;cursor:pointer;transition:.2s}
.card:hover{transform:scale(1.05)}

.tool{margin-top:20px}
input,textarea{margin:8px;padding:10px;border-radius:10px;border:none;background:#0f172a;color:white;width:250px}
button{margin:5px;padding:10px;border-radius:10px;border:none;background:linear-gradient(90deg,#38bdf8,#a78bfa);color:black;cursor:pointer}
.output{margin-top:10px;word-break:break-all}

.copy{font-size:.8rem;margin-left:8px;cursor:pointer;opacity:.7}

</style>
</head>
<body>

<div class="sidebar">
<h2>⚡ Tools</h2>
<div onclick="filter('all')">All</div>
<div onclick="filter('text')">Text</div>
<div onclick="filter('dev')">Dev</div>
<div onclick="filter('fun')">Fun</div>
</div>

<div class="main">
<header>
<h1>Mase Tools Pro</h1>
<div class="search"><input placeholder="Search..." oninput="searchTools(this.value)"></div>
</header>

<div class="grid" id="grid"></div>
<div class="tool" id="tool"></div>
</div>

<script>
const tools=[
{name:'Password',cat:'dev'},
{name:'Base64',cat:'dev'},
{name:'JSON Format',cat:'dev'},
{name:'UUID',cat:'dev'},
{name:'Hash',cat:'dev'},
{name:'Text Upper',cat:'text'},
{name:'Reverse Text',cat:'text'},
{name:'Slugify',cat:'text'},
{name:'Word Count',cat:'text'},
{name:'Lorem Ipsum',cat:'text'},
{name:'Random Number',cat:'fun'},
{name:'Color Picker',cat:'fun'},
{name:'Timestamp',cat:'fun'}
];

const grid=document.getElementById('grid');
const toolDiv=document.getElementById('tool');

function render(list){
 grid.innerHTML='';
 list.forEach(t=>{
  let d=document.createElement('div');
  d.className='card';
  d.innerText=t.name;
  d.onclick=()=>openTool(t.name);
  grid.appendChild(d);
 });
}

render(tools);

function filter(cat){
 if(cat==='all') render(tools);
 else render(tools.filter(t=>t.cat===cat));
}

function searchTools(q){
 q=q.toLowerCase();
 render(tools.filter(t=>t.name.toLowerCase().includes(q)));
}

function openTool(name){
 toolDiv.innerHTML=`<h2>${name}</h2>`;

 if(name==='Password') toolDiv.innerHTML+=`<input id='l' value='12'><button onclick='out(l.value)'>Gen</button><div id='o'></div>`;
 if(name==='Base64') toolDiv.innerHTML+=`<input id='b'><button onclick='o.innerText=btoa(b.value)'>Encode</button><div id='o'></div>`;
 if(name==='JSON Format') toolDiv.innerHTML+=`<textarea id='j'></textarea><button onclick='o.innerText=JSON.stringify(JSON.parse(j.value),null,2)'>Format</button><div id='o'></div>`;
 if(name==='UUID') toolDiv.innerHTML+=`<button onclick='o.innerText=crypto.randomUUID()'>Gen</button><div id='o'></div>`;
 if(name==='Hash') toolDiv.innerHTML+=`<input id='h'><button onclick='o.innerText=btoa(h.value)'>Hash</button><div id='o'></div>`;
 if(name==='Text Upper') toolDiv.innerHTML+=`<input id='t'><button onclick='o.innerText=t.value.toUpperCase()'>Go</button><div id='o'></div>`;
 if(name==='Reverse Text') toolDiv.innerHTML+=`<input id='r'><button onclick='o.innerText=r.value.split("").reverse().join("")'>Reverse</button><div id='o'></div>`;
 if(name==='Slugify') toolDiv.innerHTML+=`<input id='s'><button onclick='o.innerText=s.value.toLowerCase().replace(/ /g,"-")'>Slug</button><div id='o'></div>`;
 if(name==='Word Count') toolDiv.innerHTML+=`<textarea oninput='o.innerText=this.value.split(" ").length'></textarea><div id='o'></div>`;
 if(name==='Lorem Ipsum') toolDiv.innerHTML+=`<button onclick='o.innerText="Lorem ipsum dolor sit amet..."'>Gen</button><div id='o'></div>`;
 if(name==='Random Number') toolDiv.innerHTML+=`<input id='min'><input id='max'><button onclick='o.innerText=Math.floor(Math.random()*(max.value-min.value+1))+Number(min.value)'>Go</button><div id='o'></div>`;
 if(name==='Color Picker') toolDiv.innerHTML+=`<input type='color' onchange='o.innerText=this.value'><div id='o'></div>`;
 if(name==='Timestamp') toolDiv.innerHTML+=`<button onclick='o.innerText=Date.now()'>Now</button><div id='o'></div>`;
}

function out(l){let c="abcABC123!@#";let p='';for(let i=0;i<l;i++)p+=c[Math.floor(Math.random()*c.length)];o.innerText=p}
</script>

</body>
</html>
